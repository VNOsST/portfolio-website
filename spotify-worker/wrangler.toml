name = "spotify-activity-worker"
main = "src/index.ts"
compatibility_date = "2026-05-02"
workers_dev = false
preview_urls = false

[[routes]]
pattern = "spotify.samton.dev"
custom_domain = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
# Comma-separated list of allowed frontend origins for CORS
CLIENT_ORIGIN = "https://samton.dev, http://localhost:3000"

# Secrets are set via wrangler secret put:
# wrangler secret put SPOTIFY_CLIENT_ID
# wrangler secret put SPOTIFY_CLIENT_SECRET
# wrangler secret put SPOTIFY_REFRESH_TOKEN
